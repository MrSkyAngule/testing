<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>С Днем Рождения, Александр!</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #311042, #0f172a);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
            min-height: 100vh;
            min-height: -webkit-fill-available;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #fff;
            padding: 20px;
            perspective: 1000px;
        }

        html { height: -webkit-fill-available; }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 40px 25px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
            max-width: 380px;
            width: 100%;
            z-index: 10;
            transform: scale(0.9);
            opacity: 0;
            animation: cardEntrance 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.5s, box-shadow 0.5s;
        }

        @keyframes cardEntrance {
            to { transform: scale(1); opacity: 1; }
        }

        /* 3D-эффект при взрыве сюрприза */
        .card.flip-animation {
            transform: rotateY(360deg) scale(1.05);
            box-shadow: 0 30px 60px rgba(241, 196, 15, 0.3);
            border-color: rgba(241, 196, 15, 0.5);
        }

        h1 {
            font-size: 1.6rem;
            color: #f1c40f;
            font-weight: 300;
            margin-bottom: 5px;
        }

        .name {
            font-size: 2.8rem;
            display: block;
            font-weight: 900;
            margin-bottom: 25px;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #ff007f, #ffaa00, #00ffaa, #ff007f);
            background-size: 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: glow 6s linear infinite;
        }

        @keyframes glow {
            0% { background-position: 0%; }
            100% { background-position: 300%; }
        }

        .text-container {
            min-height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #94a3b8; /* Изначально скучный серый цвет */
            font-weight: 300;
            transition: opacity 0.3s ease, color 0.3s ease;
        }

        /* Стиль для финального крутого текста */
        p.real-text {
            color: #e2e8f0;
            font-size: 1.15rem;
        }

        .btn-wrapper {
            margin-top: 25px;
            min-height: 60px;
        }

        .btn {
            background: linear-gradient(135deg, #64748b, #475569); /* Скучная серая кнопка в начале */
            color: #cbd5e1;
            border: none;
            padding: 16px 35px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 280px;
            transition: all 0.4s ease;
        }

        .particle {
            position: fixed;
            z-index: 999;
            pointer-events: none;
            font-size: 26px;
            user-select: none;
            animation: flyOut 2s cubic-bezier(0.1, 0.8, 0.25, 1) forwards;
        }

        @keyframes flyOut {
            0% {
                transform: translate(0, 0) rotate(0deg) scale(0.5);
                opacity: 1;
            }
            80% { opacity: 1; }
            100% {
                transform: translate(var(--x), var(--y)) rotate(var(--r)) scale(1.2);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="card" id="mainCard">
        <h1>С Днём Рождения,</h1>
        <span class="name">Александр!</span>
        <div class="text-container">
            <!-- Скучный стартовый текст -->
            <p id="congratText">Поздравляю тебя с днем рождения. Желаю счастья в личной жизни, здоровья, успехов в труде и всего самого наилучшего. Пусть всё будет хорошо.</p>
        </div>
        <div class="btn-wrapper">
            <button class="btn" id="surpriseBtn">Ну, с праздником 😐</button>
        </div>
    </div>

    <script>
        const button = document.getElementById('surpriseBtn');
        const card = document.getElementById('mainCard');
        const text = document.getElementById('congratText');

        const shapes = ['🎉', '✨', '⭐', '🎈', '🍾', '🥂', '💥', '👑', '🔥'];

        function playSound() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;

                const ctx = new AudioContext();

                const bufferSize = ctx.sampleRate * 0.4;
                const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
                const noise = ctx.createBufferSource();
                noise.buffer = buffer;
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(400, ctx.currentTime);
                filter.frequency.exponentialRampToValueAtTime(10, ctx.currentTime + 0.4);

                const gain = ctx.createGain();
                gain.gain.setValueAtTime(0.4, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);

                noise.connect(filter);
                filter.connect(gain);
                gain.connect(ctx.destination);
                noise.start();

                setTimeout(() => {
                    const osc = ctx.createOscillator();
                    const oscGain = ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(2200, ctx.currentTime);
                    oscGain.gain.setValueAtTime(0.2, ctx.currentTime);
                    oscGain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.0);
                    osc.connect(oscGain);
                    oscGain.connect(ctx.destination);
                    osc.start();
                    osc.stop(ctx.currentTime + 1.0);
                }, 50);
            } catch (e) {}
        }

        function explodeEffect() {
            const rect = button.getBoundingClientRect();
            const startX = rect.left + rect.width / 2;
            const startY = rect.top + rect.height / 2;

            for (let i = 0; i < 75; i++) {
                const p = document.createElement('div');
                p.classList.add('particle');
                p.textContent = shapes[Math.floor(Math.random() * shapes.length)];

                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 260 + 100;
                const x = Math.cos(angle) * distance;
                const y = Math.sin(angle) * (distance * 0.6) - 180;
                const r = Math.random() * 720 - 360;

                p.style.left = startX + 'px';
                p.style.top = startY + 'px';
                p.style.setProperty('--x', `${x}px`);
                p.style.setProperty('--y', `${y}px`);
                p.style.setProperty('--r', `${r}deg`);
                p.style.animationDuration = (Math.random() * 1.0 + 1.0) + 's';

                document.body.appendChild(p);
                setTimeout(() => p.remove(), 2000);
            }
        }

        button.addEventListener('click', () => {
            // Эффекты
            card.classList.add('flip-animation');
            explodeEffect();
            setTimeout(explodeEffect, 250);

            // Переключение текста на настоящий
            text.style.opacity = '0';
            setTimeout(() => {
                text.classList.add('real-text');
                text.innerHTML = "<strong>Ладно, шучу! С праздником! 🥂</strong><br><br>Дорогой Александр! От всей души желаю, чтобы в твоей жизни всегда было железобетонное здоровье, верные друзья рядом и нескончаемый поток крутых возможностей! Пусть всё задуманное сбывается легко, а каждый день приносит кайф и успех!";
                text.style.opacity = '1';
            }, 400);

            // Исчезновение кнопки
            button.style.transform = 'scale(0)';
            button.style.opacity = '0';
            setTimeout(() => button.remove(), 400);

            playSound();
        });
    </script>
</body>
</html>
