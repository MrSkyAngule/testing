<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>С Днем Рождения, Александр!</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #311042, #0f172a);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
            min-height: 100vh;
            min-height: -webkit-fill-available;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #fff;
            padding: 20px;
            perspective: 1000px; /* Нужен для красивого 3D-переворота */
        }

        html { height: -webkit-fill-available; }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px 25px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
            max-width: 380px;
            width: 100%;
            z-index: 10;
            transform: scale(0.9);
            opacity: 0;
            animation: cardEntrance 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s;
        }

        @keyframes cardEntrance {
            to { transform: scale(1); opacity: 1; }
        }

        /* Класс, который JS добавит при клике для супер-кручения */
        .card.flip-animation {
            transform: rotateY(360deg) scale(1.05);
            box-shadow: 0 30px 60px rgba(241, 196, 15, 0.3);
            border-color: rgba(241, 196, 15, 0.5);
        }

        h1 {
            font-size: 1.6rem;
            color: #f1c40f;
            font-weight: 300;
            margin-bottom: 5px;
        }

        .name {
            font-size: 2.8rem;
            display: block;
            font-weight: 900;
            margin-bottom: 25px;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #ff007f, #ffaa00, #00ffaa, #ff007f);
            background-size: 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: glow 6s linear infinite;
        }

        @keyframes glow {
            0% { background-position: 0%; }
            100% { background-position: 300%; }
        }

        .text-container {
            min-height: 110px; /* Чтобы карточка не прыгала при смене текста */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #e0e0e0;
            font-weight: 300;
            transition: opacity 0.3s ease;
        }

        .btn-wrapper {
            margin-top: 30px;
            min-height: 60px;
        }

        .btn {
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            color: white;
            border: none;
            padding: 18px 35px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(255, 75, 43, 0.5);
            width: 100%;
            max-width: 280px;
            animation: bounce 2s infinite ease-in-out;
            transition: all 0.5s ease;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); box-shadow: 0 15px 30px rgba(255, 75, 43, 0.7); }
        }

        /* Частицы салюта */
        .particle {
            position: fixed;
            z-index: 999;
            pointer-events: none;
            font-size: 24px;
            user-select: none;
            animation: flyOut 2s cubic-bezier(0.1, 0.8, 0.25, 1) forwards;
        }

        @keyframes flyOut {
            0% {
                transform: translate(0, 0) rotate(0deg) scale(0.5);
                opacity: 1;
            }
            80% {
                opacity: 1;
            }
            100% {
                transform: translate(var(--x), var(--y)) rotate(var(--r)) scale(1.2);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="card" id="mainCard">
        <h1>С Днём Рождения,</h1>
        <span class="name">Александр!</span>
        <div class="text-container">
            <p id="congratText">Для тебя подготовлено секретное праздничное послание. Нажми на кнопку ниже, чтобы активировать его!</p>
        </div>
        <div class="btn-wrapper">
            <button class="btn" id="surpriseBtn">Открыть сюрприз 🎁</button>
        </div>
    </div>

    <script>
        const button = document.getElementById('surpriseBtn');
        const card = document.getElementById('mainCard');
        const text = document.getElementById('congratText');

        // Набор крутых праздничных эмодзи вместо обычных точек
        const shapes = ['🎉', '✨', '⭐', '🎈', '🍾', '🥂', '💥', '👑'];

        // Синтезируем аудио без внешних mp3 файлов, чтобы 100% сработало везде
        function playSound() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();

            // 1. Звук хлопушки (шум взрыва)
            const bufferSize = ctx.sampleRate * 0.4;
            const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }
            const noise = ctx.createBufferSource();
            noise.buffer = buffer;
            const filter = ctx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(400, ctx.currentTime);
            filter.frequency.exponentialRampToValueAtTime(10, ctx.currentTime + 0.4);

            const gain = ctx.createGain();
            gain.gain.setValueAtTime(0.5, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);

            noise.connect(filter);
            filter.connect(gain);
            gain.connect(ctx.destination);
            noise.start();

            // 2. Дзынь бокалов (высокий хрустальный звук)
            setTimeout(() => {
                const osc = ctx.createOscillator();
                const oscGain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(2500, ctx.currentTime);
                oscGain.gain.setValueAtTime(0.3, ctx.currentTime);
                oscGain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.2);
                osc.connect(oscGain);
                oscGain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 1.2);
            }, 50);
        }

        function explodeEffect() {
            const rect = button.getBoundingClientRect();
            const startX = rect.left + rect.width / 2;
            const startY = rect.top + rect.height / 2;

            // Генерируем 80 летящих праздничных элементов
            for (let i = 0; i < 80; i++) {
                const p = document.createElement('div');
                p.classList.add('particle');
                p.textContent = shapes[Math.floor(Math.random() * shapes.length)];

                // Рассчитываем мощный разлет по кругу и вверх
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 280 + 120;
                const x = Math.cos(angle) * distance;
                // Смещаем траекторию сильно вверх, создавая эффект фонтана
                const y = Math.sin(angle) * (distance * 0.6) - 200;
                const r = Math.random() * 720 - 360;

                p.style.left = startX + 'px';
                p.style.top = startY + 'px';
                p.style.setProperty('--x', `${x}px`);
                p.style.setProperty('--y', `${y}px`);
                p.style.setProperty('--r', `${r}deg`);
                p.style.animationDuration = (Math.random() * 1.2 + 1.2) + 's';

                document.body.appendChild(p);
                setTimeout(() => p.remove(), 2400);
            }
        }

        button.addEventListener('click', () => {
            // Включаем звук
            try { playSound(); } catch(e) {}

            // Запускаем 3D-кручение карточки
            card.classList.add('flip-animation');

            // Убираем кнопку красиво
            button.style.animation = 'none';
            button.style.transform = 'scale(0)';
            button.style.opacity = '0';
            setTimeout(() => button.remove(), 500);

            // Бахаем салют
            explodeEffect();
            // Вторая волна салюта чуть позже для масштабности
            setTimeout(explodeEffect, 300);

            // Плавно меняем текст на главное душевное поздравление
            text.style.opacity = '0';
            setTimeout(() => {
