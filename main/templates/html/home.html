<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>С Днем Рождения, Александр!</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            /* Динамический живой фон, который медленно переливается */
            background: linear-gradient(-45deg, #141e30, #243b55, #0f2027, #203a43);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            min-height: -webkit-fill-available;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #fff;
            padding: 20px;
        }

        html {
            height: -webkit-fill-available;
        }

        /* Анимация перелива фона */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px 25px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6), inset 0 0 20px rgba(255,255,255,0.05);
            max-width: 380px;
            width: 100%;
            z-index: 10;
            /* Эффект вылета карточки при старте */
            transform: translateY(50px) scale(0.8);
            opacity: 0;
            animation: cardEntrance 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            transition: transform 0.3s ease;
        }

        @keyframes cardEntrance {
            to {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }

        h1 {
            font-size: 1.6rem;
            margin-bottom: 5px;
            color: #f1c40f;
            text-shadow: 0 0 10px rgba(241, 196, 15, 0.3);
            font-weight: 300;
            opacity: 0;
            animation: fadeInText 1s ease forwards 0.5s;
        }

        /* Имя горит и переливается */
        .name {
            font-size: 2.8rem;
            display: block;
            font-weight: 900;
            margin-bottom: 25px;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #ff007f, #ffaa00, #00ffaa, #ff007f);
            background-size: 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: glow 6s linear infinite;
            opacity: 0;
            animation: glow 6s linear infinite, fadeInText 1s ease forwards 0.8s;
        }

        @keyframes glow {
            0% { background-position: 0%; }
            100% { background-position: 300%; }
        }

        @keyframes fadeInText {
            to { opacity: 1; }
        }

        p {
            font-size: 1.05rem;
            line-height: 1.7;
            margin-bottom: 35px;
            color: #e0e0e0;
            font-weight: 300;
            opacity: 0;
            animation: fadeInText 1s ease forwards 1.1s;
        }

        /* Кнопка с анимацией пульсации и прыжков */
        .btn {
            position: relative;
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            color: white;
            border: none;
            padding: 18px 35px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(255, 75, 43, 0.5);
            width: 100%;
            max-width: 280px;
            animation: pulseAndJump 2s infinite ease-in-out;
            transition: all 0.3s ease;
        }

        @keyframes pulseAndJump {
            0%, 100% { transform: scale(1) translateY(0); }
            50% { transform: scale(1.05) translateY(-6px); box-shadow: 0 15px 30px rgba(255, 75, 43, 0.7); }
        }

        .btn:active {
            transform: scale(0.9) translateY(2px) !important;
            animation: none;
        }

        /* Стили для взрывного фонтана конфетти */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            z-index: 1;
            pointer-events: none;
            border-radius: 50%;
            animation: explosion 3s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
        }

        @keyframes explosion {
            0% {
                transform: translate(0, 0) rotate(0deg);
                opacity: 1;
            }
            100% {
                /* Разлетаются во все стороны и падают вниз */
                transform: translate(var(--x), var(--y)) rotate(var(--r)) scale(0);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="card" id="mainCard">
        <h1>С Днём Рождения,</h1>
        <span class="name">Александр!</span>
        <p>От всей души желаю тебе крепкого здоровья, неиссякаемой энергии и больших успехов! Пусть каждый день приносит новые крутые возможности, верные решения и поводы для искренней улыбки!</p>
        <button class="btn" id="surpriseBtn">Открыть сюрприз 🎁</button>
    </div>

    <script>
        const button = document.getElementById('surpriseBtn');
        const card = document.getElementById('mainCard');
        const colors = ['#ff0055', '#00ffcc', '#ffcc00', '#9900ff', '#ff6600', '#00ff00', '#0066ff'];

        // Интерактивный легкий наклон карточки при движении пальца/мыши
        document.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 25;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 25;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        // Сброс наклона, если убрали мышь
        document.addEventListener('mouseleave', () => {
            card.style.transform = 'rotateY(0deg) rotateX(0deg)';
        });

        function launchConfettiStorm() {
            const btnRect = button.getBoundingClientRect();
            // Центр кнопки, откуда полетит салют
            const startX = btnRect.left + btnRect.width / 2;
            const startY = btnRect.top + btnRect.height / 2;

            // Создаем 120 праздничных частиц
            for (let i = 0; i < 120; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');

                // Случайная траектория взрыва (влево, вправо, высоко вверх)
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 250 + 100; // скорость разлета
                const x = Math.cos(angle) * velocity + (Math.random() * 100 - 50);
                // Заставляем большинство частиц лететь вверх (отрицательный Y)
                const y = Math.sin(angle) * (velocity * 0.5) - (Math.random() * 300 + 150);
                const rotation = Math.random() * 720;

                confetti.style.position = 'fixed';
                confetti.style.left = startX + 'px';
                confetti.style.top = startY + 'px';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.borderRadius = Math.random() > 0.4 ? '50%' : '0px';

                // Передаем координаты в CSS-переменные для анимации
                confetti.style.setProperty('--x', `${x}px`);
                confetti.style.setProperty('--y', `${y}px`);
                confetti.style.setProperty('--r', `${rotation}deg`);
                confetti.style.animationDuration = (Math.random() * 1.5 + 1.5) + 's';

                document.body.appendChild(confetti);

                setTimeout(() => { confetti.remove(); }, 3000);
            }
        }

        button.addEventListener('click', () => {
            // Отключаем прыгающую анимацию кнопки после клика
            button.style.animation = 'none';

            // Взрываем конфетти!
            launchConfettiStorm();

            // Меняем стиль кнопки на победный
            button.innerText = 'Ура! С праздником! 🥂';
            button.style.background = 'linear-gradient(135deg, #11998e, #38ef7d)';
            button.style.boxShadow = '0 10px 25px rgba(56, 239, 125, 0.5)';
            button.style.transform = 'scale(1.05)';

            // Делаем добавку салюта через полсекунды для пущего эффекта!
            setTimeout(launchConfettiStorm, 400);
        });
    </script>
</body>
</html>
