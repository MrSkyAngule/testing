<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>С Днем Рождения, Александр!</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #1f4068 0%, #162447 50%, #1a1a2e 100%);
            min-height: 100vh;
            min-height: -webkit-fill-available;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #fff;
            padding: 20px;
        }

        html {
            height: -webkit-fill-available;
        }

        .card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 35px 25px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            width: 100%;
            z-index: 10;
            transform: scale(0.9);
            opacity: 0;
            animation: fadeIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes fadeIn {
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
            color: #f1c40f;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            font-weight: 400;
        }

        .name {
            font-size: 2.6rem;
            display: block;
            font-weight: 800;
            color: #fff;
            margin-bottom: 25px;
            letter-spacing: 1px;
            background: linear-gradient(45deg, #ffffff, #f1c40f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 35px;
            color: #e0e0e0;
            font-weight: 300;
        }

        .btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s ease, background-color 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 6px 20px rgba(231, 76, 60, 0.4);
            width: 100%;
            max-width: 280px;
        }

        .btn:active {
            background: #ff6b6b;
            transform: scale(0.95);
            box-shadow: 0 4px 10px rgba(231, 76, 60, 0.2);
        }

        .confetti {
            position: absolute;
            width: 8px;
            height: 8px;
            top: -10px;
            z-index: 1;
            pointer-events: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to {
                transform: translateY(110vh) rotate(360deg);
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>С Днём Рождения,</h1>
        <span class="name">Александр!</span>
        <p>От всей души желаю крепкого здоровья, неиссякаемой энергии и больших успехов во всех начинаниях. Пусть каждый день приносит новые возможности, верные решения и поводы для искренней улыбки!</p>
        <button class="btn" id="surpriseBtn">Открыть сюрприз 🎁</button>
    </div>

    <script>
        const button = document.getElementById('surpriseBtn');
        const colors = ['#e74c3c', '#2ecc71', '#3498db', '#f1c40f', '#9b59b6', '#1abc9c'];

        function createConfetti() {
            for (let i = 0; i < 60; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');

                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDuration = (Math.random() * 2.5 + 1.5) + 's';
                confetti.style.opacity = Math.random() * 0.6 + 0.4;
                confetti.style.transform = `scale(${Math.random() * 1.2})`;
                confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0px';

                document.body.appendChild(confetti);

                setTimeout(() => { confetti.remove(); }, 4000);
            }
        }

        button.addEventListener('click', () => {
            createConfetti();
            button.innerText = 'Ура! С праздником! 🥂';
            button.style.background = '#2ecc71';
            button.style.boxShadow = '0 6px 20px rgba(46, 204, 113, 0.4)';
        });
    </script>
</body>
</html>
