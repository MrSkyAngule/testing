<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>С Днем Рождения, Александр!</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(-45deg, #0b132b, #1c2541, #3a506b, #0b132b);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
            min-height: 100vh;
            min-height: -webkit-fill-available;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #fff;
            padding: 20px;
            perspective: 1000px;
        }

        html { height: -webkit-fill-available; }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 40px 25px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
            max-width: 390px;
            width: 100%;
            z-index: 10;
            transform: scale(0.9);
            opacity: 0;
            animation: cardEntrance 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.5s, box-shadow 0.5s;
        }

        @keyframes cardEntrance {
            to { transform: scale(1); opacity: 1; }
        }

        .card.flip-animation {
            transform: rotateY(360deg) scale(1.05);
            box-shadow: 0 30px 60px rgba(74, 222, 128, 0.2);
            border-color: rgba(74, 222, 128, 0.4);
        }

        h1 {
            font-size: 1.6rem;
            color: #94a3b8;
            font-weight: 300;
            margin-bottom: 5px;
            transition: color 0.5s;
        }

        .card.flip-animation h1 {
            color: #f1c40f;
            text-shadow: 0 0 10px rgba(241, 196, 15, 0.3);
        }

        .name {
            font-size: 2.8rem;
            display: block;
            font-weight: 900;
            margin-bottom: 25px;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #94a3b8, #cbd5e1, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transition: background 0.5s;
        }

        .card.flip-animation .name {
            background: linear-gradient(90deg, #ff7e5f, #feb47b, #f1c40f, #ff7e5f);
            background-size: 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: glow 6s linear infinite;
        }

        @keyframes glow {
            0% { background-position: 0%; }
            100% { background-position: 300%; }
        }

        .text-container {
            min-height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        p {
            font-size: 1.05rem;
            line-height: 1.6;
            color: #cbd5e1; /* Обычный белый цвет для первого текста */
            font-weight: 400;
            transition: opacity 0.3s ease;
        }

        p.real-text {
            color: #f8fafc;
            font-size: 1.05rem;
            text-align: left;
        }

        .btn-wrapper {
            margin-top: 25px;
            min-height: 60px;
        }

        .btn {
            background: linear-gradient(135deg, #e2e8f0, #cbd5e1);
            color: #475569;
            border: none;
            padding: 16px 35px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 280px;
            transition: all 0.4s ease;
        }

        .particle {
            position: fixed;
            z-index: 999;
            pointer-events: none;
            font-size: 28px;
            user-select: none;
            animation: flyOut 2.2s cubic-bezier(0.1, 0.8, 0.25, 1) forwards;
        }

        @keyframes flyOut {
            0% {
                transform: translate(0, 0) rotate(0deg) scale(0.4);
                opacity: 1;
            }
            80% { opacity: 1; }
            100% {
                transform: translate(var(--x), var(--y)) rotate(var(--r)) scale(1.3);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="card" id="mainCard">
        <h1>С Днём Рождения,</h1>
        <span class="name">Александр!</span>
        <div class="text-container">
            <!-- Скучный стандартный стишок из интернета -->
            <p id="congratText">Желаю счастья и добра,🌻<br>Чтоб жизнь веселою была!🎈<br>Улыбок, солнца и тепла,☀️<br>Чтоб ладились твои дела!🌺<br>Здоровья, радости, удачи,<br>И становиться лишь богаче!🎁</p>
        </div>
        <div class="btn-wrapper">
            <!-- Обычная банальная кнопка -->
            <button class="btn" id="surpriseBtn">Спасибо! 💐</button>
        </div>
    </div>

    <script>
        const button = document.getElementById('surpriseBtn');
        const card = document.getElementById('mainCard');
        const text = document.getElementById('congratText');

        const expeditionShapes = ['🏔️', '⛰️', '⛺', '🔥', '🚙', '🦅', '🎒', '🧭', '🌲', '🌊'];

        function playSound() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();

                const bufferSize = ctx.sampleRate * 0.5;
                const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
                const noise = ctx.createBufferSource();
                noise.buffer = buffer;
                const filter = ctx.createBiquadFilter();
                filter.type = 'bandpass';
                filter.frequency.setValueAtTime(300, ctx.currentTime);
                filter.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.5);

                const gain = ctx.createGain();
                gain.gain.setValueAtTime(0.3, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);

                noise.connect(filter);
                filter.connect(gain);
                gain.connect(ctx.destination);
                noise.start();
            } catch (e) {}
        }

        function explodeExpedition() {
            const rect = button.getBoundingClientRect();
            const startX = rect.left + rect.width / 2;
            const startY = rect.top + rect.height / 2;

            for (let i = 0; i < 75; i++) {
                const p = document.createElement('div');
                p.classList.add('particle');
                p.textContent = expeditionShapes[Math.floor(Math.random() * expeditionShapes.length)];

                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 280 + 120;
                const x = Math.cos(angle) * distance;
                const y = Math.sin(angle) * (distance * 0.7) - 220;
                const r = Math.random() * 360 - 180;

                p.style.left = startX + 'px';
                p.style.top = startY + 'px';
                p.style.setProperty('--x', `${x}px`);
                p.style.setProperty('--y', `${y}px`);
                p.style.setProperty('--r', `${r}deg`);
                p.style.animationDuration = (Math.random() * 1.2 + 1.0) + 's';

                document.body.appendChild(p);
                setTimeout(() => p.remove(), 2200);
            }
        }

        button.addEventListener('click', () => {
            card.classList.add('flip-animation');
            explodeExpedition();
            setTimeout(explodeExpedition, 250);

            text.style.opacity = '0';
            setTimeout(() => {
                text.classList.add('real-text');
                text.innerHTML = "<strong>Ладно, забудь этот стишок! Лови настоящее! 🧭</strong><br><br>Саня, с днюхой тебя! Желаем, чтобы техника никогда не подводила, а дикие тропы <strong>Алтая</strong>, суровые хребты <strong>Урала</strong> и чистые просторы <strong>Байкала</strong> всегда встречали тебя идеальной погодой! Пусть группы туристов будут легкими на подъем, здоровье — гранитным, а любимое дело приносит мощный доход и кайф. Полного бака и новых крутых маршрутов! 🚙💨";
                text.style.opacity = '1';
            }, 400);

            button.style.transform = 'scale(0)';
            button.style.opacity = '0';
            setTimeout(() => button.remove(), 400);

            playSound();
        });
    </script>
</body>
</html>
